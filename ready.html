<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Commercial Work for Residential GCs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: #fff;
    color: #111;
    -webkit-font-smoothing: antialiased;
  }
  .wrap {
    max-width: 480px;
    margin: 0 auto;
    padding: 40px 20px 60px;
  }
  h1 {
    font-size: 27px;
    font-weight: 700;
    line-height: 1.2;
    letter-spacing: -0.5px;
    text-align: center;
    margin-bottom: 8px;
  }
  h1 span { color: #E53E3E; }
  .sub {
    text-align: center;
    color: #6b7280;
    font-size: 14px;
    line-height: 1.6;
    margin-bottom: 24px;
  }
  .video-wrap {
    position: relative;
    padding-bottom: 56.25%;
    height: 0;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 6px 24px rgba(0,0,0,0.1);
    margin-bottom: 24px;
  }
  .video-wrap iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border: none;
  }

  /* STEP 1 — name + phone */
  #step1 { transition: opacity 0.2s; }
  input {
    display: block;
    width: 100%;
    padding: 15px 16px;
    margin-bottom: 10px;
    border-radius: 8px;
    border: 1.5px solid #e5e7eb;
    background: #f9fafb;
    color: #111;
    font-size: 15px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }
  input:focus { border-color: #E53E3E; background: #fff; }
  .btn {
    display: block;
    width: 100%;
    padding: 17px;
    border-radius: 8px;
    border: none;
    background: #E53E3E;
    color: #fff;
    font-size: 17px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    letter-spacing: -0.2px;
    transition: background 0.15s;
    margin-top: 2px;
  }
  .btn:hover { background: #c53030; }
  .note {
    text-align: center;
    color: #9ca3af;
    font-size: 12px;
    margin-top: 10px;
  }

  /* STEP 2 — calendar */
  #step2 {
    display: none;
    animation: fadeIn 0.3s ease;
  }
  #step2.show { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .calendar-header {
    text-align: center;
    margin-bottom: 20px;
  }
  .calendar-header h2 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.3px;
    margin-bottom: 6px;
  }
  .calendar-header p {
    color: #6b7280;
    font-size: 13px;
  }
  .calendar-wrap {
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid #e5e7eb;
  }
</style>
</head>
<body>
<div class="wrap">

  <h1>Land commercial jobs.<br><span>We do the legwork.</span></h1>
  <p class="sub">We find commercial projects in your market, package your bids, and work with you until you close.</p>

  <div class="video-wrap">
    <iframe
      src="https://www.loom.com/embed/2e6a1f5996b740a09dd8b88c3770976b"
      frameborder="0"
      webkitallowfullscreen mozallowfullscreen allowfullscreen
    ></iframe>
  </div>

  <!-- STEP 1 -->
  <div id="step1">
    <input type="text" id="name" placeholder="Your name" autocomplete="name" />
    <input type="tel" id="phone" placeholder="Phone number" autocomplete="tel" />
    <button class="btn" onclick="next()">Get My Commercial Shortlist →</button>
    <p class="note">Takes 30 seconds · No commitment</p>
  </div>

  <!-- STEP 2 -->
  <div id="step2">
    <div class="calendar-header">
      <h2>Pick a time that works for you.</h2>
      <p>30 mins · We'll walk you through what's available in your market.</p>
    </div>
    <div class="calendar-wrap">
      <iframe
        src="https://api.leadconnectorhq.com/widget/booking/1TlP0Ykosu7tPrhnhBPy"
        style="width:100%;border:none;overflow:hidden;min-height:700px;"
        scrolling="no"
        id="1TlP0Ykosu7tPrhnhBPy_1773196505669"
      ></iframe>
    </div>
  </div>

</div>

<script src="https://api.leadconnectorhq.com/js/form_embed.js" type="text/javascript"></script>
<script>
  function next() {
    const name = document.getElementById('name').value.trim();
    const phone = document.getElementById('phone').value.trim();
    if (!name) { document.getElementById('name').focus(); return; }
    if (phone.length < 7) { document.getElementById('phone').focus(); return; }

    // Hide step 1, show calendar
    document.getElementById('step1').style.display = 'none';
    const step2 = document.getElementById('step2');
    step2.classList.add('show');

    // Scroll to calendar smoothly
    setTimeout(() => step2.scrollIntoView({ behavior: 'smooth', block: 'start' }), 50);
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') next(); });
</script>
</body>
</html>
