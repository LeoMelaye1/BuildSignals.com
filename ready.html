<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Commercial Work for Residential GCs</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
    background: #fff;
    color: #111;
    -webkit-font-smoothing: antialiased;
  }
  .wrap {
    max-width: 480px;
    margin: 0 auto;
    padding: 40px 20px 60px;
  }
  h1 {
    font-size: 27px;
    font-weight: 700;
    line-height: 1.2;
    letter-spacing: -0.5px;
    text-align: center;
    margin-bottom: 8px;
  }
  h1 span { color: #E53E3E; }
  .sub {
    text-align: center;
    color: #6b7280;
    font-size: 14px;
    line-height: 1.6;
    margin-bottom: 24px;
  }
  .video-wrap {
    position: relative;
    padding-bottom: 56.25%;
    height: 0;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 6px 24px rgba(0,0,0,0.1);
    margin-bottom: 24px;
  }
  .video-wrap iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border: none;
  }
  input {
    display: block;
    width: 100%;
    padding: 15px 16px;
    margin-bottom: 10px;
    border-radius: 8px;
    border: 1.5px solid #e5e7eb;
    background: #f9fafb;
    color: #111;
    font-size: 15px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }
  input:focus { border-color: #E53E3E; background: #fff; }
  button {
    display: block;
    width: 100%;
    padding: 17px;
    border-radius: 8px;
    border: none;
    background: #E53E3E;
    color: #fff;
    font-size: 17px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    letter-spacing: -0.2px;
    transition: background 0.15s;
    margin-top: 2px;
  }
  button:hover { background: #c53030; }
  .note {
    text-align: center;
    color: #9ca3af;
    font-size: 12px;
    margin-top: 10px;
  }
</style>
</head>
<body>
<div class="wrap">

  <h1>Land commercial jobs.<br><span>We do the legwork.</span></h1>
  <p class="sub">We find commercial projects in your market, package your bids, and work with you until you close.</p>

  <!-- Loom — autoplay + 1x speed -->
  <div class="video-wrap">
    <iframe
      src="https://www.loom.com/embed/bbc84c679bc143b8be78303ef0f98693?autoplay=1&muted=0&playbackSpeed=1"
      frameborder="0"
      webkitallowfullscreen mozallowfullscreen allowfullscreen
    ></iframe>
  </div>

  <input type="text" id="name" placeholder="Your name" autocomplete="name" />
  <input type="tel" id="phone" placeholder="Phone number" autocomplete="tel" />
  <button onclick="next()">Get My Commercial Shortlist →</button>
  <p class="note">Takes 30 seconds · No commitment</p>

</div>
<script>
  // ← Paste your GHL webhook URL here (Automations → Webhooks → Copy URL)
  const GHL_WEBHOOK = "https://services.leadconnectorhq.com/hooks/IFtiovGmHoKETytJU9wy/webhook-trigger/1e68bf96-e265-4986-8de5-87d7140f1506";

  function next() {
    const nameVal = document.getElementById('name').value.trim();
    const phoneVal = document.getElementById('phone').value.trim();
    if (!nameVal) { document.getElementById('name').focus(); return; }
    if (phoneVal.length < 7) { document.getElementById('phone').focus(); return; }

    // Send to GHL in the background — fire and forget
    if (GHL_WEBHOOK !== "YOUR_GHL_WEBHOOK_URL") {
      const parts = nameVal.split(' ');
      fetch(GHL_WEBHOOK, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          first_name: parts[0] || '',
          last_name: parts.slice(1).join(' ') || '',
          phone: phoneVal,
          source: "buildsignals-landing-page"
        })
      }).catch(() => {}); // silently ignore errors so redirect always happens
    }

    // Redirect to calendar with prefill
    const parts = nameVal.split(' ');
    const firstName = encodeURIComponent(parts[0] || '');
    const lastName = encodeURIComponent(parts.slice(1).join(' ') || '');
    const phone = encodeURIComponent(phoneVal);

    window.location.href =
      `https://api.leadconnectorhq.com/widget/booking/1TlP0Ykosu7tPrhnhBPy?first_name=${firstName}&last_name=${lastName}&phone=${phone}`;
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') next(); });
</script>
</body>
</html>
