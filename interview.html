<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Growth Partner Interview | BuildSignals</title>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            min-height: 100vh; 
            background-color: #f1f5f9;
            font-family: -apple-system, system-ui, sans-serif;
        }
        .calendar-wrapper {
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            min-height: 100vh;
        }
        .calendar-card {
            width: 100%;
            max-width: 1100px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            border: 1px solid #e2e8f0;
            overflow: hidden; /* Prevents iframe from breaking border-radius */
        }
        iframe { 
            width: 100%; 
            height: 800px;
            border: none;
            display: block; /* Removes any default inline spacing */
        }
        
        @media (max-width: 768px) {
            .calendar-wrapper {
                padding: 0;
            }
            .calendar-card {
                border-radius: 0;
                border: none;
                box-shadow: none; /* Cleaner on mobile */
            }
            iframe {
                height: 1100px;
            }
        }
    </style>
</head>
<body>
    <div class="calendar-wrapper">
        <div class="calendar-card">
            <iframe 
                src="https://api.leadconnectorhq.com/widget/booking/fnTve28NLm8CdmTXR301" 
                scrolling="no" 
                id="fnTve28NLm8CdmTXR301_1770781477429">
            </iframe>
            <script src="https://link.msgsndr.com/js/form_embed.js" type="text/javascript"></script>
        </div>
    </div>
</body>
</html>
