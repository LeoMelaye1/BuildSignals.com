<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Growth Partner Interview | BuildSignals</title>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            min-height: 100vh; 
            background-color: #f8fafc; /* Professional off-white */
            font-family: sans-serif;
            display: flex;
            justify-content: center;
        }

        .page-wrapper {
            width: 100%;
            max-width: 1000px;
            padding: 60px 20px; /* Generous padding around the widget */
            box-sizing: border-box;
        }

        .calendar-card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            overflow: hidden; /* Clips the iframe to the rounded corners */
            border: 1px solid #e2e8f0;
        }

        iframe { 
            width: 100%; 
            height: 900px; /* Forced height to stop the weird squishing */
            border: none; 
        }

        @media (max-width: 600px) {
            .page-wrapper { padding: 20px 10px; }
            iframe { height: 1100px; } /* Mobile needs more height */
        }
    </style>
</head>
<body>

    <div class="page-wrapper">
        <div class="calendar-card">
            <iframe 
                src="https://api.leadconnectorhq.com/widget/booking/fnTve28NLm8CdmTXR301" 
                scrolling="no" 
                id="fnTve28NLm8CdmTXR301_1770781477429">
            </iframe>
            <script src="https://link.msgsndr.com/js/form_embed.js" type="text/javascript"></script>
        </div>
    </div>

</body>
</html>
