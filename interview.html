<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Growth Partner Interview | BuildSignals</title>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            min-height: 100vh; 
            background-color: #f1f5f9; /* Soft professional background */
            font-family: -apple-system, system-ui, sans-serif;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px; /* Desktop Padding */
        }

        .calendar-card {
            width: 100%;
            max-width: 1100px; /* Keeps it from getting too wide on desktop */
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }

        iframe { 
            width: 100%; 
            height: 800px; /* Desktop height */
            border: none; 
        }

        /* The Mobile Overhaul */
        @media (max-width: 768px) {
            .container {
                padding: 0; /* Remove outer padding so it goes edge-to-edge */
            }
            .calendar-card {
                border-radius: 0; /* Edge-to-edge looks better on small screens */
                border: none;
            }
            iframe {
                height: 1100px; /* Mobile needs more vertical space for the list */
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="calendar-card">
            <iframe 
                src="https://api.leadconnectorhq.com/widget/booking/fnTve28NLm8CdmTXR301" 
                scrolling="no" 
                id="fnTve28NLm8CdmTXR301_1770781477429">
            </iframe>
            <script src="https://link.msgsndr.com/js/form_embed.js" type="text/javascript"></script>
        </div>
    </div>

</body>
</html>
