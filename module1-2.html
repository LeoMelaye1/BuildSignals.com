<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deployment Calculator // Build Signals</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0F172A;
            --card: #1E293B;
            --text: #F8FAFC;
            --accent: #3B82F6;
            --success: #10B981;
            --danger: #EF4444;
            --border: #334155;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .calculator-card {
            background-color: var(--card);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 480px;
            border: 1px solid var(--border);
        }

        h1 {
            font-size: 20px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0 0 5px 0;
            color: #94A3B8;
        }

        .subtitle {
            font-size: 14px;
            color: #64748B;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 30px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }

        .currency-input {
            position: relative;
        }

        .currency-symbol {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #94A3B8;
            font-size: 18px;
        }

        input[type="number"] {
            width: 100%;
            background: #0F172A;
            border: 2px solid var(--border);
            color: white;
            padding: 15px 15px 15px 35px; /* space for $ */
            font-family: 'JetBrains Mono', monospace;
            font-size: 24px;
            border-radius: 8px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="number"]:focus {
            border-color: var(--accent);
        }

        /* RESULTS GRID */
        .results-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .result-box {
            background: #0F172A;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--border);
            text-align: center;
        }

        .result-label {
            font-size: 11px;
            color: #64748B;
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .result-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 24px;
            font-weight: 700;
            color: white;
        }

        /* BIG NUMBER */
        .main-result {
            background: rgba(59, 130, 246, 0.1); /* Blue tint */
            border: 1px solid var(--accent);
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .main-label {
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent);
            margin-bottom: 10px;
        }

        .main-number {
            font-size: 64px;
            font-weight: 900;
            line-height: 1;
            margin-bottom: 10px;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
        }

        /* DYNAMIC COLORS */
        .mode-easy .main-result { border-color: var(--danger); background: rgba(239, 68, 68, 0.1); }
        .mode-easy .main-label { color: var(--danger); }
        .mode-easy .status-badge { background: var(--danger); color: #fff; }

        .mode-hard .main-result { border-color: var(--success); background: rgba(16, 185, 129, 0.1); }
        .mode-hard .main-label { color: var(--success); }
        .mode-hard .status-badge { background: var(--success); color: #064E3B; }

        .assumptions {
            margin-top: 30px;
            font-size: 11px;
            color: #475569;
            text-align: center;
            line-height: 1.6;
        }

    </style>
</head>
<body>

    <div class="calculator-card">
        <h1>Income Engineer</h1>
        <div class="subtitle">Reverse engineer your daily workload.</div>

        <div class="input-group">
            <label>Monthly Income Goal ($)</label>
            <div class="currency-input">
                <span class="currency-symbol">$</span>
                <input type="number" id="incomeGoal" placeholder="5000" value="5000">
            </div>
        </div>

        <div class="results-grid">
            <div class="result-box">
                <div class="result-label">Base Salary</div>
                <div class="result-value" style="color: #64748B;">$500</div>
            </div>
            <div class="result-box">
                <div class="result-label">Commission Needed</div>
                <div class="result-value" id="commNeeded">$4,500</div>
            </div>
            <div class="result-box">
                <div class="result-label">Deals Needed</div>
                <div class="result-value" id="dealsNeeded">23</div>
            </div>
            <div class="result-box">
                <div class="result-label">Exp. Value / Dial</div>
                <div class="result-value" style="color: var(--success);">$2.00</div>
            </div>
        </div>

        <div class="main-result" id="mainBox">
            <div class="main-label">Daily Dials Required</div>
            <div class="main-number" id="dailyDials">113</div>
            <div class="status-badge" id="statusBadge">Wealth Mode</div>
        </div>

        <div class="assumptions">
            Based on: $200 Commission per Deal | 20 Working Days | 1% Closing Rate (100 Dials = 1 Deal).
        </div>
    </div>

    <script>
        const incomeInput = document.getElementById('incomeGoal');
        const commDisplay = document.getElementById('commNeeded');
        const dealsDisplay = document.getElementById('dealsNeeded');
        const dialsDisplay = document.getElementById('dailyDials');
        const mainBox = document.getElementById('mainBox');
        const statusBadge = document.getElementById('statusBadge');

        function calculate() {
            // CONSTANTS
            const BASE_SALARY = 500;
            const COMM_PER_DEAL = 200;
            const DIALS_PER_DEAL = 100; // 1% conversion from cold dial to close
            const WORKING_DAYS = 20;

            // INPUT
            let goal = parseFloat(incomeInput.value);
            
            // LOGIC
            if (isNaN(goal) || goal < 500) goal = 500;

            let commissionNeeded = goal - BASE_SALARY;
            if (commissionNeeded < 0) commissionNeeded = 0;

            let dealsNeeded = commissionNeeded / COMM_PER_DEAL;
            let totalDials = dealsNeeded * DIALS_PER_DEAL;
            let dailyDials = Math.ceil(totalDials / WORKING_DAYS);

            // UPDATE UI
            commDisplay.textContent = "$" + commissionNeeded.toLocaleString();
            dealsDisplay.textContent = Math.ceil(dealsNeeded);
            dialsDisplay.textContent = dailyDials;

            // DYNAMIC STYLING
            mainBox.classList.remove('mode-easy', 'mode-hard');
            
            if (dailyDials < 40) {
                mainBox.classList.add('mode-easy');
                statusBadge.textContent = "Broke Zone (Too Low)";
            } else if (dailyDials > 150) {
                statusBadge.textContent = "Grind Mode (Hard)";
            } else {
                mainBox.classList.add('mode-hard');
                statusBadge.textContent = "Wealth Zone (Optimal)";
            }
        }

        // Listen for typing
        incomeInput.addEventListener('input', calculate);

        // Run once on load
        calculate();
    </script>

</body>
</html>
