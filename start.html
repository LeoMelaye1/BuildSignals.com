<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Onboarding | Build Signals</title>
    <style>
        /* --- BRAND VARIABLES --- */
        :root {
            --bg-color: #F5F7FA;      
            --card-bg: #FFFFFF;
            --text-main: #111827;     
            --border: #E5E7EB;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 550px; /* Narrower for focus */
            padding: 20px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            border: 1px solid var(--border);
            text-align: center;
        }

        .logo {
            width: 140px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
            margin: 0 0 10px 0;
        }

        p {
            color: #6B7280;
            font-size: 14px;
            margin-bottom: 30px;
        }

        /* GHL Form Styling Override (Optional) */
        iframe {
            width: 100% !important;
            border: none !important;
        }

    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <img src="logo.png" alt="Build Signals" class="logo">
            
            <h1>Initialize Onboarding</h1>
            <p>Confirm your legal details to generate your contract.</p>

            <div id="ghl-form-container">
                <iframe
    src="https://api.leadconnectorhq.com/widget/form/baURiE2VAms7nnFWt7PL"
    style="width:100%;height:100%;border:none;border-radius:3px"
    id="inline-baURiE2VAms7nnFWt7PL" 
    data-layout="{'id':'INLINE'}"
    data-trigger-type="alwaysShow"
    data-trigger-value=""
    data-activation-type="alwaysActivated"
    data-activation-value=""
    data-deactivation-type="neverDeactivate"
    data-deactivation-value=""
    data-form-name="External - Direct Deposit Info"
    data-height="543"
    data-layout-iframe-id="inline-baURiE2VAms7nnFWt7PL"
    data-form-id="baURiE2VAms7nnFWt7PL"
    title="External - Direct Deposit Info"
        >
</iframe>
<script src="https://link.msgsndr.com/js/form_embed.js"></script>
            </div>
            
        </div>
        
        <div style="text-align: center; margin-top: 20px;">
            <p style="font-size: 12px; color: #9CA3AF;">
                <span style="display: inline-block; margin-right: 5px;">🔒</span> 
                256-bit Secure SSL Connection
            </p>
        </div>
    </div>

</body>
</html>
