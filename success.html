<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointment Secured!</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0fdf4; /* Light Green Background */
            font-family: sans-serif;
            text-align: center;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
        }
        h1 { color: #166534; margin-bottom: 10px; }
        p { color: #4b5563; margin-bottom: 20px; }
        
        /* The Countdown Timer Style */
        .timer {
            font-size: 14px;
            color: #9ca3af;
            margin-top: 20px;
        }

        .btn {
            background-color: #166534;
            color: white;
            padding: 15px 30px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            display: inline-block;
            transition: transform 0.1s;
        }
        .btn:hover { transform: scale(1.05); background-color: #14532d; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Boom! 🎯</h1>
        <p>Appointment locked in. Commission secured.</p>
        
        <a href="booking.html" class="btn">Book Another Lead Now</a>

        <div class="timer">Redirecting in <span id="countdown">10</span> seconds...</div>
    </div>

    <script>
        // 1. Confetti Animation
        window.onload = function() {
            var duration = 3 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

            function random(min, max) { return Math.random() * (max - min) + min; }

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) { return clearInterval(interval); }
                var particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: random(0.1, 0.3), y: Math.random() - 0.2 } }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: random(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);
        };

        // 2. Auto-Redirect Logic
        var seconds = 10; // How long to wait
        var countdownElement = document.getElementById("countdown");

        var countdownInterval = setInterval(function() {
            seconds--;
            countdownElement.textContent = seconds;

            if (seconds <= 0) {
                clearInterval(countdownInterval);
                // Redirect to your booking page
                window.location.href = "booking.html"; 
            }
        }, 1000);
    </script>

</body>
</html>
