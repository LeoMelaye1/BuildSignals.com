<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointment Secured!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0fdf4; /* Light Green Background */
            font-family: sans-serif;
            text-align: center;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
        }
        /* Style for the meme image */
        .meme-gif {
            width: 100%;
            max-height: 250px;
            object-fit: cover; /* Ensures it fits nicely */
            border-radius: 8px;
            margin-bottom: 20px;
        }
        h1 { color: #166534; margin: 0 0 10px 0; font-size: 28px; }
        p { color: #4b5563; margin: 0 0 20px 0; font-size: 18px; font-weight: bold;}
        
        /* The Countdown Timer Style */
        .timer {
            font-size: 14px;
            color: #9ca3af;
            margin-top: 20px;
        }

        .btn {
            background-color: #166534;
            color: white;
            padding: 15px 30px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            display: inline-block;
            transition: transform 0.1s;
        }
        .btn:hover { transform: scale(1.05); background-color: #14532d; }
    </style>
</head>
<body>

    <div class="card">
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM2Q0YzNhNGEzYjA5N2Q4YjE0YjI4YjI5YjI2YjI3YjI4YjI5YyZlcD12MV9pbnRlcm5hbF9naWZzX2dpZklkJmN0PWc/3o7abKhOpu0NwenH3O/giphy.gif" alt="Funny Cat Thumbs Up" class="meme-gif">
        
        <h1>:) Great Job!</h1>
        <p>Appointment locked in.</p>
        
        <a href="booking.html" class="btn">Book Another Lead Now</a>

        <div class="timer">Redirecting in <span id="countdown">10</span> seconds...</div>
    </div>

    <script>
        // Auto-Redirect Logic
        var seconds = 10; // How long to wait
        var countdownElement = document.getElementById("countdown");

        var countdownInterval = setInterval(function() {
            seconds--;
            countdownElement.textContent = seconds;

            if (seconds <= 0) {
                clearInterval(countdownInterval);
                // Redirect to your booking page
                window.location.href = "internal-booking"; 
            }
        }, 1000);
    </script>

</body>
</html>
